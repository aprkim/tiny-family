<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    (function() {
      var path = window.location.pathname;
      var slug = null;

      // /in/hazel (legacy)
      var match = path.match(/^\/in\/([a-z0-9][a-z0-9-]{0,19})\/?$/);
      if (match) slug = match[1];

      // /hazel (root-level custom name)
      if (!slug) {
        var rootMatch = path.match(/^\/([a-z0-9][a-z0-9-]{0,19})\/?$/);
        if (rootMatch) slug = rootMatch[1];
      }

      if (slug) {
        var params = new URLSearchParams(window.location.search);
        params.set('room', slug);
        window.location.replace('/?' + params.toString());
      } else {
        window.location.replace('/' + window.location.search);
      }
    })();
  </script>
</head>
<body></body>
</html>
